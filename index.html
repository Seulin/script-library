<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Script Library</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 목록 페이지 -->
  <section id="view-list" class="view">
    <header class="page-header">
      <h1>🎬 Script Library</h1>
    </header>
    <div id="episode-grid" class="episode-grid">
      <p class="loading">불러오는 중…</p>
    </div>
  </section>

  <!-- 대본 보기 페이지 -->
  <section id="view-script" class="view" hidden>
    <header class="page-header script-topbar">
      <a href="#/" class="back-link">← 목록</a>
      <div id="script-header" class="script-header"></div>
    </header>
    <div id="lines" class="lines"></div>

    <!-- 하단 플로팅: 이전/목록/이후 에피소드 이동 -->
    <nav id="episode-nav" class="episode-nav" aria-label="에피소드 이동">
      <a class="epnav-btn epnav-prev" href="#/">← 이전</a>
      <a class="epnav-btn epnav-list" href="#/">목록</a>
      <a class="epnav-btn epnav-next" href="#/">이후 →</a>
    </nav>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
