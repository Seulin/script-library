<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영어 드라마 대본 공부</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 목록 페이지 -->
  <section id="view-list" class="view">
    <header class="page-header">
      <h1>🎬 영어 드라마 대본 공부</h1>
      <p class="hint">공부할 대본을 선택하세요.</p>
    </header>
    <div id="episode-grid" class="episode-grid">
      <p class="loading">불러오는 중…</p>
    </div>
  </section>

  <!-- 대본 보기 페이지 -->
  <section id="view-script" class="view" hidden>
    <header class="page-header script-topbar">
      <a href="#/" class="back-link">← 목록</a>
      <div id="script-header" class="script-header"></div>
    </header>
    <div class="script-toolbar">
      <p class="hint script-hint">영어 대사를 먼저 이해해보고, 토글이나 카드 클릭으로 해석을 확인하세요.</p>
      <button id="toggle-all" class="toggle-all" type="button" aria-pressed="false">해석 보기</button>
    </div>
    <div id="lines" class="lines"></div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
